version: '3.7'

services:
  database:
    image: postgres
    container_name: database
    restart: always
    ports:
      - 5432:5432
      - 9229:9229
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=ottongib
      - POSTGRES_DB=bolao
    volumes:
      - dbdata:/data/postgres

  app:
    container_name: big-bolao-api
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/usr/app
    environment:
      - PORT=3333
    ports:
      - 3333:3333

volumes:
  dbdata:
    driver: local
